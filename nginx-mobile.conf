# ReeveOS Mobile App — Nginx Location Block
# Add this INSIDE the portal.rezvo.app server block in your Nginx config
# Usually at: /etc/nginx/sites-available/rezvo or similar
#
# Place it BEFORE the catch-all location / block

# Mobile PWA app
location /app/ {
    alias /opt/reeveos-mobile/dist/;
    try_files $uri $uri/ /app/index.html;

    # Cache static assets (JS, CSS, images) for 1 year
    location ~* \.(js|css|png|jpg|svg|ico|woff2?)$ {
        alias /opt/reeveos-mobile/dist/;
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
